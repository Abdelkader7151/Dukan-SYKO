<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYKO Restaurant - Brooklyn</title>
  <meta
    name="description"
    content="Explore SYKO Restaurant in Brooklyn on Prospect Park W, Syrian and Korean halal cuisine with dine-in, delivery, and takeout."
  >
  <link rel="icon" href="public/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="page-restaurant">
  <div id="syko-global-loader" class="syko-loader-screen" role="status" aria-live="polite" aria-label="Loading page">
    <div class="syko-loader-wrap">
      <div class="syko-loader-ring"></div>
      <div class="syko-loader-logo">
        <img src="public/branding/syko-logo-transparent.webp" alt="SYKO">
      </div>
    </div>
  </div>
  <div data-include="navigation.html"></div>

  <main>
    <section class="interior-hero interior-hero-restaurant">
      <div class="hero-layer hero-pattern">
        <img src="public/illustrations/SyKo-14.webp" alt="" class="hero-cover">
      </div>
      <div class="interior-hero-gradient interior-hero-gradient-red"></div>
      <div class="hero-ornament hero-ornament-left d-none d-lg-block">
        <img src="public/illustrations/SyKo-08.webp" alt="">
      </div>
      <div class="hero-ornament hero-ornament-right d-none d-md-block">
        <img src="public/illustrations/SyKo-06.webp" alt="SYKO restaurant storefront">
      </div>

      <div class="section-shell position-relative z-1">
        <div class="interior-hero-copy" data-animate data-delay="0">
          <p class="eyebrow mb-3">Restaurant</p>
          <h1 class="page-title mb-0">SYKO Restaurant</h1>
          <p class="interior-description">
            A modern Syrian-Korean restaurant experience with dine-in, delivery, and takeout rooted in warmth and craft.
          </p>
        </div>
      </div>
    </section>

    <section class="section-shell pb-5 pb-md-6">
      <div class="menu-shell">
        <div class="menu-header" data-animate data-delay="0">
          <p class="eyebrow mb-2">Menu</p>
          <h2 class="section-headline text-cream">Restaurant Products</h2>
        </div>

        <div id="restaurant-menu-app" data-animate data-delay="80"></div>
      </div>
    </section>
  </main>

  <div data-include="footer.html"></div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/restaurant.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
